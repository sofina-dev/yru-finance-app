<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบใบสำคัญรับเงิน</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #faf8f3;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #appFrame {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
      background: #fff;
    }

    #appLoading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(250,248,243,0.88);
      backdrop-filter: blur(4px);
      z-index: 99999;
      opacity: 1;
      transition: opacity .25s ease;
    }

    #appLoading.hide {
      opacity: 0;
      pointer-events: none;
    }

    .loading-card {
      min-width: 280px;
      max-width: 360px;
      padding: 22px 24px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid #e8e5de;
      box-shadow: 0 12px 36px rgba(15,32,68,0.14);
      text-align: center;
    }

    .spinner {
      width: 42px;
      height: 42px;
      margin: 0 auto 14px;
      border: 4px solid #e5e7eb;
      border-top-color: #1a3366;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      color: #0f2044;
      margin-bottom: 4px;
    }

    .sub {
      font-size: 13px;
      color: #6b7280;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="appLoading">
    <div class="loading-card">
      <div class="spinner"></div>
      <div class="title">กำลังเปิดหน้าใหม่</div>
      <div class="sub">กรุณารอสักครู่นะคะ</div>
    </div>
  </div>

  <iframe id="appFrame" allow="fullscreen"></iframe>

  <script>
    const GAS_BASE = "https://script.google.com/macros/s/AKfycbx7_PtlgAD2ItsHJmCXBWcKHqj1JsAX_Kca0yaKoNdavqIX1sDNXOrWTBLxVAa83KXN/exec";
    const frame = document.getElementById("appFrame");
    const loading = document.getElementById("appLoading");

    function showLoading() {
      loading.classList.remove("hide");
    }

    function hideLoading() {
      loading.classList.add("hide");
    }

    function buildGasUrlFromCurrentLocation() {
      const currentUrl = new URL(window.location.href);
      return GAS_BASE + currentUrl.search;
    }

    function navigateInWrapper(params = {}, replaceState = false) {
      const current = new URL(window.location.href);

      Object.keys(params).forEach(key => {
        const value = params[key];
        if (value === undefined || value === null || value === "") {
          current.searchParams.delete(key);
        } else {
          current.searchParams.set(key, value);
        }
      });

      if (replaceState) {
        history.replaceState({}, "", current.toString());
      } else {
        history.pushState({}, "", current.toString());
      }

      showLoading();
      frame.src = GAS_BASE + current.search;
    }

    frame.addEventListener("load", () => {
      // เผื่อ render ภายใน iframe อีกนิด จะดูนุ่มกว่า
      setTimeout(hideLoading, 120);
    });

    window.addEventListener("message", (event) => {
      const data = event.data || {};
      if (data.type === "navigate") {
        navigateInWrapper(data.params || {});
      }
      if (data.type === "show-loading") {
        showLoading();
      }
    });

    window.addEventListener("popstate", () => {
      showLoading();
      frame.src = buildGasUrlFromCurrentLocation();
    });

    // initial load
    frame.src = buildGasUrlFromCurrentLocation();
  </script>
</body>
</html>
