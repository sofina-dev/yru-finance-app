<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบใบสำคัญรับเงิน</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f6f7fb;
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
      background: #fff;
    }
  </style>
</head>
<body>
  <iframe id="appFrame"></iframe>

  <script>
    const GAS_BASE = "https://script.google.com/macros/s/AKfycbz8-s_ZguywHelbx0zpzYsADFFO9xvb8QvhkdHX4YJO3iRzPNTSDM8wg11CD-68H-rp4g/exec";

    const currentUrl = new URL(window.location.href);
    const finalUrl = GAS_BASE + currentUrl.search;

    document.getElementById("appFrame").src = finalUrl;
  </script>
</body>
</html>
