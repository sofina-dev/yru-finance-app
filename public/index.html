<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบใบสำคัญรับเงิน</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #f6f7fb 0%, #eef3ff 100%);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    #appFrame {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
      background: #fff;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    #appFrame.loaded {
      opacity: 1;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f6f7fb 0%, #eef3ff 100%);
      z-index: 9999;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    .loading-screen.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-card {
      min-width: 260px;
      max-width: 90vw;
      padding: 28px 32px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 18px 45px rgba(58, 87, 145, 0.12);
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .spinner {
      width: 52px;
      height: 52px;
      margin: 0 auto 18px;
      border: 5px solid #dbe6ff;
      border-top: 5px solid #5b8def;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .loading-title {
      font-size: 20px;
      font-weight: 700;
      color: #24324a;
      margin-bottom: 8px;
    }

    .loading-subtitle {
      font-size: 14px;
      color: #667085;
      line-height: 1.6;
    }

    .error {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
      color: #7a1f1f;
      background: #fff7f7;
      font-size: 16px;
      line-height: 1.7;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-card">
      <div class="spinner"></div>
      <div class="loading-title">กำลังโหลดระบบ</div>
      <div class="loading-subtitle">กรุณารอสักครู่...</div>
    </div>
  </div>

  <iframe id="appFrame"></iframe>

  <script>
    async function initApp() {
      try {
        const res = await fetch('./config.json?v=2', { cache: 'no-store' });

        if (!res.ok) {
          throw new Error('โหลด config.json ไม่สำเร็จ');
        }

        const config = await res.json();
        const GAS_BASE = config.GAS_BASE || '';

        if (!GAS_BASE) {
          throw new Error('ไม่พบค่า GAS_BASE ใน config.json');
        }

        const currentUrl = new URL(window.location.href);
        const finalUrl = GAS_BASE + currentUrl.search;

        const frame = document.getElementById('appFrame');
        const loadingScreen = document.getElementById('loadingScreen');

        frame.onload = () => {
          frame.classList.add('loaded');
          loadingScreen.classList.add('hide');
        };

        frame.src = finalUrl;

        window.addEventListener('message', (event) => {
          if (!event.data || event.data.type !== 'navigate') return;

          loadingScreen.classList.remove('hide');
          frame.classList.remove('loaded');

          const url = new URL(window.location.href);
          const params = event.data.params || {};

          Object.keys(params).forEach((key) => {
            const value = params[key];
            if (value !== undefined && value !== null && value !== '') {
              url.searchParams.set(key, value);
            } else {
              url.searchParams.delete(key);
            }
          });

          window.location.href = url.toString();
        });
      } catch (err) {
        console.error(err);
        document.body.innerHTML = `
          <div class="error">
            ไม่สามารถโหลดค่าตั้งค่าระบบได้<br>
            กรุณาตรวจสอบไฟล์ config.json
          </div>
        `;
      }
    }

    initApp();
  </script>
</body>
</html>
