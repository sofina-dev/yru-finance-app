<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบใบสำคัญรับเงิน</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f6f7fb;
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
      background: #fff;
    }
  </style>
</head>
<body>
  <iframe id="appFrame"></iframe>

  <script src="/app-config.js"></script>
  <script>
    const GAS_BASE = window.APP_CONFIG?.GAS_BASE || "";
    const currentUrl = new URL(window.location.href);
    const finalUrl = GAS_BASE + currentUrl.search;

    document.getElementById("appFrame").src = finalUrl;

    window.addEventListener("message", (event) => {
      if (!event.data || event.data.type !== "navigate") return;

      const url = new URL(window.location.href);
      const params = event.data.params || {};

      Object.keys(params).forEach(key => {
        const value = params[key];
        if (value !== undefined && value !== null && value !== "") {
          url.searchParams.set(key, value);
        } else {
          url.searchParams.delete(key);
        }
      });

      window.location.href = url.toString();
    });
  </script>
</body>
</html>
