<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบใบสำคัญรับเงิน</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f6f7fb;
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
      background: #fff;
    }
    .loading, .error {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      color: #333;
      background: #f6f7fb;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="status" class="loading">กำลังโหลดระบบ...</div>
  <iframe id="appFrame" style="display:none;"></iframe>

  <script>
    async function initApp() {
      try {
        const res = await fetch('/config.json?v=1', { cache: 'no-store' });

        if (!res.ok) {
          throw new Error('โหลด config.json ไม่สำเร็จ');
        }

        const config = await res.json();
        const GAS_BASE = config.GAS_BASE || '';

        if (!GAS_BASE) {
          throw new Error('ไม่พบค่า GAS_BASE ใน config.json');
        }

        const currentUrl = new URL(window.location.href);
        const finalUrl = GAS_BASE + currentUrl.search;

        const frame = document.getElementById('appFrame');
        frame.src = finalUrl;
        frame.style.display = 'block';

        const status = document.getElementById('status');
        if (status) status.remove();

        window.addEventListener('message', (event) => {
          if (!event.data || event.data.type !== 'navigate') return;

          const url = new URL(window.location.href);
          const params = event.data.params || {};

          Object.keys(params).forEach((key) => {
            const value = params[key];
            if (value !== undefined && value !== null && value !== '') {
              url.searchParams.set(key, value);
            } else {
              url.searchParams.delete(key);
            }
          });

          window.location.href = url.toString();
        });
      } catch (err) {
        console.error(err);
        const status = document.getElementById('status');
        status.className = 'error';
        status.innerHTML = 'ไม่สามารถโหลดค่าตั้งค่าระบบได้<br>กรุณาตรวจสอบไฟล์ config.json';
      }
    }

    initApp();
  </script>
</body>
</html>
