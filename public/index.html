<script>
  async function loadPage() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (window.location.pathname.includes("view") && id) {
      try {
        const res = await fetch(`/api/receipt?id=${id}`);
        const text = await res.text();

        console.log("API RAW:", text);

        const data = JSON.parse(text);

        document.getElementById("app").innerHTML =
          `<h2>ใบสำคัญเลขที่ ${data.id}</h2>
           <p>ชื่อ: ${data.name}</p>
           <p>จำนวนเงิน: ${data.amount}</p>`;
      } catch (err) {
        document.getElementById("app").innerHTML =
          `<pre style="color:red;">โหลดข้อมูลไม่สำเร็จ\n${err}</pre>`;
        console.error(err);
      }
    } else {
      document.getElementById("app").innerHTML =
        `<h2>หน้าแรก</h2>
         <a href="/view?id=123">ดูตัวอย่าง</a>`;
    }
  }
  window.onload = loadPage;
</script>
