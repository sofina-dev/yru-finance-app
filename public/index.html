<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Receipt App</title>
  <script>
    async function loadPage() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");

      if (window.location.pathname.includes("view") && id) {
        const res = await fetch(`/api/receipt?id=${id}`);
        const data = await res.json();
        document.getElementById("app").innerHTML =
          `<h2>ใบสำคัญเลขที่ ${data.id}</h2>
           <p>ชื่อ: ${data.name}</p>
           <p>จำนวนเงิน: ${data.amount}</p>`;
      } else {
        document.getElementById("app").innerHTML =
          `<h2>หน้าแรก</h2>
           <a href="/view?id=123">ดูตัวอย่าง</a>`;
      }
    }
    window.onload = loadPage;
  </script>
</head>
<body>
  <div id="app">Loading...</div>
</body>
</html>
